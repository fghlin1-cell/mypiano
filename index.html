<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手機鋼琴</title>

<style>
body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    touch-action: none;
}

#overlay {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
    color: white;
    flex-direction: column;
}

button {
    padding: 20px 40px;
    font-size: 22px;
}

.piano {
    display: flex;
}

.key {
    width: 60px;
    height: 200px;
    background: white;
    border: 1px solid #ccc;
}

.key.active {
    background: #ddd;
}
</style>
</head>

<body>

<div id="overlay">
    <h1>點擊開始</h1>
    <button id="start">開始</button>
</div>

<div class="piano">
    <div class="key" data-note="261.63"></div>
    <div class="key" data-note="293.66"></div>
    <div class="key" data-note="329.63"></div>
    <div class="key" data-note="349.23"></div>
    <div class="key" data-note="392.00"></div>
</div>

<script>
let ctx;

document.getElementById("start").onclick = async () => {
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    await ctx.resume();
    document.getElementById("overlay").style.display = "none";
};

document.querySelectorAll(".key").forEach(key => {
    key.addEventListener("click", () => {
        if (!ctx) return;

        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.frequency.value = key.dataset.note;
        gain.gain.value = 0.3;

        osc.connect(gain);
        gain.connect(ctx.destination);

        osc.start();
        osc.stop(ctx.currentTime + 0.5);

        key.classList.add("active");
        setTimeout(() => key.classList.remove("active"), 100);
    });
});
</script>

</body>
</html>
