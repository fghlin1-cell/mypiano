<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>行動網頁鋼琴</title>
    <style>
        :root {
            --white-key-width: 50px;
            --white-key-height: 200px;
            --black-key-width: 34px;
            --black-key-height: 120px;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; /* 防止手機上滑動造成頁面跳動 */
            touch-action: none; /* 禁用瀏覽器預設手勢 */
        }

        .instructions {
            color: #aaa;
            margin-bottom: 20px;
            text-align: center;
            padding: 0 10px;
        }

        .piano {
            display: flex;
            position: relative;
            padding: 10px;
            background: #333;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* 白鍵 */
        .key {
            width: var(--white-key-width);
            height: var(--white-key-height);
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 10px;
            border-radius: 0 0 5px 5px;
            user-select: none;
            box-sizing: border-box;
            transition: background 0.05s;
        }

        .key.active {
            background: #e0e0e0;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
            transform: translateY(2px);
        }

        /* 黑鍵 */
        .key.black {
            width: var(--black-key-width);
            height: var(--black-key-height);
            background: #222;
            color: white;
            margin-left: calc(var(--black-key-width) / -2);
            margin-right: calc(var(--black-key-width) / -2);
            z-index: 2;
            border-radius: 0 0 3px 3px;
            border: none;
        }

        .key.black.active {
            background: #444;
        }

        /* 啟動覆蓋層 (解鎖音訊) */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            cursor: pointer;
        }

        /* 手機螢幕優化：如果螢幕太窄，縮小琴鍵 */
        @media (max-width: 600px) {
            :root {
                --white-key-width: 40px;
                --white-key-height: 160px;
                --black-key-width: 28px;
                --black-key-height: 100px;
            }
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h2>點擊畫面開始彈奏 🎹</h2>
    </div>

    <div class="instructions">
        電腦：按鍵盤 A-K | 手機：直接點擊琴鍵
    </div>

    <div class="piano">
        <div class="key" data-note="C4">A</div>
        <div class="key black" data-note="Cs4">W</div>
        <div class="key" data-note="D4">S</div>
        <div class="key black" data-note="Ds4">E</div>
        <div class
