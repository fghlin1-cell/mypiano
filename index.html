<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極簡網頁鋼琴</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #222;
            font-family: sans-serif;
        }

        .piano {
            display: flex;
            position: relative;
        }

        /* 白鍵樣式 */
        .key {
            width: 60px;
            height: 200px;
            border: 1px solid #000;
            background: white;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 10px;
            border-radius: 0 0 5px 5px;
            user-select: none;
            transition: background 0.1s;
        }

        .key:active, .key.active {
            background: #ddd;
        }

        /* 黑鍵樣式 */
        .key.black {
            width: 40px;
            height: 120px;
            background: black;
            color: white;
            margin-left: -20px;
            margin-right: -20px;
            z-index: 2;
            border-radius: 0 0 3px 3px;
        }

        .key.black:active, .key.black.active {
            background: #444;
        }
    </style>
</head>
<body>

    <div class="piano">
        <div class="key" data-note="C4">A</div>
        <div class="key black" data-note="Cs4">W</div>
        <div class="key" data-note="D4">S</div>
        <div class="key black" data-note="Ds4">E</div>
        <div class="key" data-note="E4">D</div>
        <div class="key" data-note="F4">F</div>
        <div class="key black" data-note="Fs4">T</div>
        <div class="key" data-note="G4">G</div>
        <div class="key black" data-note="Gs4">Y</div>
        <div class="key" data-note="A4">H</div>
        <div class="key black" data-note="As4">U</div>
        <div class="key" data-note="B4">J</div>
        <div class="key" data-note="C5">K</div>
    </div>

    <script>
        // 設定頻率對照表 (C4 為中央C)
        const notes = {
            "C4": 261.63, "Cs4": 277.18, "D4": 293.66, "Ds4": 311.13,
            "E4": 329.63, "F4": 349.23, "Fs4": 369.99, "G4": 392.00,
            "Gs4": 415.30, "A4": 440.00, "As4": 466.16, "B4": 493.88, "C5": 523.25
        };

        // 鍵盤按鍵映射
        const keyMap = {
            'a': 'C4', 'w': 'Cs4', 's': 'D4', 'e': 'Ds4', 'd': 'E4', 
            'f': 'F4', 't': 'Fs4', 'g': 'G4', 'y': 'Gs4', 'h': 'A4', 
            'u': 'As4', 'j': 'B4', 'k': 'C5'
        };

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playNote(frequency) {
            if (!frequency) return;
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'triangle'; // 聲音類型：sine, square, sawtooth, triangle
            oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 1);
        }

        // 滑鼠點擊事件
        document.querySelectorAll('.key').forEach(key => {
            key.addEventListener('mousedown', () => {
                const note = key.dataset.note;
                playNote(notes[note]);
            });
        });

        // 實體鍵盤事件
        window.addEventListener('keydown', (e) => {
            const note = keyMap[e.key.toLowerCase()];
            if (note) {
                const keyElement = document.querySelector(`[data-note="${note}"]`);
                keyElement.classList.add('active');
                playNote(notes[note]);
            }
        });

        window.addEventListener('keyup', (e) => {
            const note = keyMap[e.key.toLowerCase()];
            if (note) {
                const keyElement = document.querySelector(`[data-note="${note}"]`);
                keyElement.classList.remove('active');
            }
        });
    </script>
</body>
</html>
